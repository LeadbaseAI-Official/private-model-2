name: Run Llama

on:
  workflow_dispatch:

jobs:
  prepare-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Cache GGUF Model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: gemma-4-E2B-it-Q5_K_M.gguf
          key: gemma-4-E2B-model-${{ runner.os }}-v2

      - name: Download GGUF Model if not cached
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          echo "Model cache miss. Downloading GGUF model from Hugging Face..."
          wget -q --show-progress https://huggingface.co/unsloth/gemma-4-E2B-it-GGUF/resolve/main/gemma-4-E2B-it-Q5_K_M.gguf -O gemma-4-E2B-it-Q5_K_M.gguf

      - name: Cache or Build llama-cli
        run: |
          if [ -f "./llama-cli" ]; then
            echo "llama-cli already exists in repository. Skipping build."
          else
            echo "llama-cli not found in repository. Installing build tools and compiling..."
            sudo apt update && sudo apt install -y cmake build-essential git
            git clone --depth 1 https://github.com/ggerganov/llama.cpp
            cmake -B llama.cpp/build llama.cpp
            cmake --build llama.cpp/build --target llama-cli -j 2
            cp llama.cpp/build/bin/llama-cli ./
            rm -rf llama.cpp
            chmod +x llama-cli
            
            echo "Committing and pushing llama-cli to repository..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add llama-cli
            git commit -m "chore: cache compiled llama-cli [automated]"
            git push origin HEAD:main
          fi

      - name: Cache Python Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-no-avx-v2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          CMAKE_ARGS="-DLLAMA_AVX=OFF -DLLAMA_AVX2=OFF -DLLAMA_FMA=OFF" .venv/bin/pip install llama-cpp-python --no-cache-dir --force-reinstall --no-binary llama-cpp-python
          .venv/bin/pip install -r requirements.txt

  run-server:
    needs: prepare-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Restore GGUF Model Cache
        uses: actions/cache@v4
        with:
          path: gemma-4-E2B-it-Q5_K_M.gguf
          key: gemma-4-E2B-model-${{ runner.os }}-v2

      - name: Create Swap Space for 12B Model
        run: |
          echo "Allocating 10GB swap file..."
          sudo swapoff /swapfile_gemma || true
          sudo rm -f /swapfile_gemma || true
          sudo fallocate -l 10G /swapfile_gemma
          sudo chmod 600 /swapfile_gemma
          sudo mkswap /swapfile_gemma
          sudo swapon /swapfile_gemma
          free -h

      - name: Cache Python Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-no-avx-v2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared

      - name: Restore Prefix Cache
        id: restore-prefix
        uses: actions/cache/restore@v4
        with:
          path: states
          key: prefix-state-${{ hashFiles('system.md', 'persona.json', 'kb.json') }}-v3

      - name: Run Warmup
        if: steps.restore-prefix.outputs.cache-hit != 'true'
        run: |
          .venv/bin/python warmup.py

      - name: Save Prefix Cache
        if: steps.restore-prefix.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: states
          key: prefix-state-${{ hashFiles('system.md', 'persona.json', 'kb.json') }}-v3

      - name: Start FastAPI Server
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          GITHUB_ORG: ${{ secrets.GH_ORG }}
        run: |
          .venv/bin/python -u server.py